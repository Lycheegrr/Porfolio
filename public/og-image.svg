  <g fill="#00d4ff">
    <circle cx="920" cy="220" r="9" opacity="0.55"/>
    <circle cx="1040" cy="155" r="5.5" opacity="0.38"/>
    <circle cx="1090" cy="300" r="6.5" opacity="0.42"/>
    <circle cx="960" cy="370" r="5.5" opacity="0.38"/>
    <circle cx="830" cy="310" r="5.5" opacity="0.38"/>
    <circle cx="1110" cy="190" r="4" opacity="0.28"/>
    <circle cx="770" cy="380" r="4" opacity="0.28"/>
    <circle cx="830" cy="450" r="4" opacity="0.28"/>
    <circle cx="1130" cy="390" r="4" opacity="0.28"/>
  </g>

  <!-- Bottom accent bar -->
  <rect y="627" width="1200" height="3" fill="#00d4ff" opacity="0.4"/>
