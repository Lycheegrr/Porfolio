    <line x1="920" y1="220" x2="1090" y2="300"/>
    <line x1="920" y1="220" x2="960" y2="370"/>
    <line x1="920" y1="220" x2="830" y2="310"/>
    <line x1="1040" y1="155" x2="1090" y2="300"/>
    <line x1="1090" y1="300" x2="960" y2="370"/>
    <line x1="960" y1="370" x2="830" y2="310"/>
    <line x1="1040" y1="155" x2="1110" y2="190"/>
    <line x1="1110" y1="190" x2="1090" y2="300"/>
    <line x1="830" y1="310" x2="770" y2="380"/>
    <line x1="770" y1="380" x2="830" y2="450"/>
    <line x1="830" y1="450" x2="960" y2="370"/>
    <line x1="1090" y1="300" x2="1130" y2="390"/>
    <line x1="1130" y1="390" x2="960" y2="370"/>
